name: Refresh Daily Drive

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'
      timezone: 'Europe/Paris'
    - cron: '0 16 * * *'
      timezone: 'Europe/Paris'

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore config.yaml
        run: |
          cat > config.yaml <<'EOF'
          ${{ secrets.CONFIG_YAML }}
          EOF

      - name: Restore Spotify token
        run: |
          cat > .spotify-token.json <<'EOF'
          ${{ secrets.SPOTIFY_TOKEN_JSON }}
          EOF

      - name: Install dependencies
        run: npm install

      - name: Run Daily Drive
        run: node index.js
